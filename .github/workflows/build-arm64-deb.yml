name: Build ARM64 DEB for Kylin V10
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04-arm
    steps:
      - name: 检出代码 (Checkout code)
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境 (Setup Node.js)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖并构建 (Install & Build)
        run: |
          npm install
          npm run electron:build -- --linux deb --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传构建产物 (Upload Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: super-productivity-linux-arm64-deb
          path: release/*.deb
